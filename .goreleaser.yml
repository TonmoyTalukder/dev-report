version: 2

project_name: dev-report

before:
  hooks:
    - go mod tidy

builds:
  - id: dev-report
    main: ./main.go
    binary: dev-report
    ldflags:
      - -s -w -X github.com/dev-report/dev-report/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "dev-report_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: dev-report
    name: dev-report
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
